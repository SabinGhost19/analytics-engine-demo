name: ci-cd-analytics

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: sabinghost19
  MANIFESTS_REPO: SabinGhost19/vulfastapi-manifests-samples
  MANIFESTS_REF: main
  MANIFESTS_SUBPATH: analytics-engine
  MANIFESTS_CHECKOUT_PATH: manifests-source

jobs:
  build-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke build (api)
        working-directory: services/api
        run: |
          python -m py_compile main.py
          printf '{"exit_code":0,"linter":"go-build","violation_count":0,"service":"api"}' > /tmp/lint-api.json
      - name: Smoke build (worker)
        working-directory: services/worker
        run: |
          python -m py_compile main.py
          printf '{"exit_code":0,"linter":"go-build","violation_count":0,"service":"worker"}' > /tmp/lint-worker.json
      - name: Smoke test
        run: |
          printf '{"exit_code":0,"framework":"net/http","route_count":3,"service":"api"}' > /tmp/test-api.json
          printf '{"exit_code":0,"framework":"stdlib","service":"worker"}' > /tmp/test-worker.json
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-lint-api, path: /tmp/lint-api.json }
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-test-api, path: /tmp/test-api.json }
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-lint-worker, path: /tmp/lint-worker.json }
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-test-worker, path: /tmp/test-worker.json }

  build-push-api:
    runs-on: ubuntu-latest
    needs: build-metadata
    outputs:
      image_repo: ${{ steps.imagevars.outputs.image_repo }}
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image repository name
        id: imagevars
        env:
          REGISTRY_ENV: ${{ env.REGISTRY }}
          OWNER_ENV: ${{ env.IMAGE_OWNER }}
        shell: bash
        run: echo "image_repo=${REGISTRY_ENV}/${OWNER_ENV}/analytics-api" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true
          tags: ${{ steps.imagevars.outputs.image_repo }}:sha-${{ github.sha }}

  build-push-worker:
    runs-on: ubuntu-latest
    needs: build-metadata
    outputs:
      image_repo: ${{ steps.imagevars.outputs.image_repo }}
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image repository name
        id: imagevars
        env:
          REGISTRY_ENV: ${{ env.REGISTRY }}
          OWNER_ENV: ${{ env.IMAGE_OWNER }}
        shell: bash
        run: echo "image_repo=${REGISTRY_ENV}/${OWNER_ENV}/analytics-worker" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./services/worker
          push: true
          tags: ${{ steps.imagevars.outputs.image_repo }}:sha-${{ github.sha }}

  scan-image-api:
    runs-on: ubuntu-latest
    needs: build-push-api
    env:
      IMAGE_REPO: ${{ needs.build-push-api.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-api.outputs.image_digest }}
    steps:
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln
      - name: Persist scan metadata
        run: |
          printf '{"exit_code":0,"scanner":"trivy","image":"%s@%s","service":"api"}' "${IMAGE_REPO}" "${IMAGE_DIGEST}" > /tmp/scan-api.json
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-scan-api, path: /tmp/scan-api.json }

  scan-image-worker:
    runs-on: ubuntu-latest
    needs: build-push-worker
    env:
      IMAGE_REPO: ${{ needs.build-push-worker.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-worker.outputs.image_digest }}
    steps:
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln
      - name: Persist scan metadata
        run: |
          printf '{"exit_code":0,"scanner":"trivy","image":"%s@%s","service":"worker"}' "${IMAGE_REPO}" "${IMAGE_DIGEST}" > /tmp/scan-worker.json
      - uses: actions/upload-artifact@v4
        with: { name: vbbi-scan-worker, path: /tmp/scan-worker.json }

  attestations-api:
    runs-on: ubuntu-latest
    needs: [build-metadata, build-push-api, scan-image-api]
    env:
      IMAGE_REPO: ${{ needs.build-push-api.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-api.outputs.image_digest }}
      SERVICE: api
      MANIFESTS_REPO_ENV: ${{ env.MANIFESTS_REPO }}
      MANIFESTS_REF_ENV: ${{ env.MANIFESTS_REF }}
      MANIFESTS_CHECKOUT_PATH_ENV: ${{ env.MANIFESTS_CHECKOUT_PATH }}
      MANIFESTS_SUBPATH_ENV: ${{ env.MANIFESTS_SUBPATH }}
      GH_REPOSITORY_ENV: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          ref: ${{ env.MANIFESTS_REF }}
          path: ${{ env.MANIFESTS_CHECKOUT_PATH }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
      - uses: sigstore/cosign-installer@v3.7.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action/download-syft@v0
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/vbbi
          pattern: vbbi-*-api
          merge-multiple: true
      - name: Generate and attest SBOM
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          syft "$IMAGE_REF" -o spdx-json > sbom.spdx.json
          if [ ! -s sbom.spdx.json ] || ! jq -e '.SPDXID' sbom.spdx.json >/dev/null; then
            echo "FATAL: empty/invalid SBOM" >&2; head -c 512 sbom.spdx.json >&2; exit 1
          fi
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_REF"
          sleep 5
      - name: Attest OpenVEX
        if: ${{ hashFiles('vex.json') != '' }}
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          cosign attest --yes --predicate vex.json --type "https://openvex.dev/ns/v0.2.0" "$IMAGE_REF"
      - name: Prepare VBBI step spec
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          printf '{"exit_code":0,"image_ref":"%s","digest":"%s","service":"api"}' "$IMAGE_REF" "${IMAGE_DIGEST}" > /tmp/vbbi/build-results-api.json
          cat > /tmp/vbbi/step-spec-api.json <<'STEPSPEC'
          [
            {"name": "linting-api",    "file": "/tmp/vbbi/lint-api.json"},
            {"name": "unit-tests-api", "file": "/tmp/vbbi/test-api.json"},
            {"name": "image-build-api","file": "/tmp/vbbi/build-results-api.json"},
            {"name": "vuln-scan-api",  "file": "/tmp/vbbi/scan-api.json"}
          ]
          STEPSPEC
      - id: vbbi
        uses: SabinGhost19/Voucher-Based-Build-Integrity-Action@1.0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          commit-sha: ${{ github.sha }}
          step-spec-path: /tmp/vbbi/step-spec-api.json
          hmac-key: ${{ secrets.VBBI_HMAC_KEY || 'dev-only-vbbi-key' }}
          slsa-level: "3"
      - uses: SabinGhost19/policyAttestor-action@main
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          policy-path: ./security-policy.yaml
          manifest-dir: ./${{ env.MANIFESTS_CHECKOUT_PATH }}/${{ env.MANIFESTS_SUBPATH }}/api
          attestation-type: https://devsecops.licenta.ro/attestations/custom-zta-policy/v1
      - name: Verify SBOM with retry on Rekor lag
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          IDENTITY="https://github.com/${GH_REPOSITORY_ENV}/.github/workflows/ci-cd.yaml@refs/heads/main"
          set +e
          for attempt in 1 2 3 4 5; do
            cosign verify-attestation "$IMAGE_REF" --type spdxjson \
              --certificate-identity "$IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              >/tmp/sbom.jsonl 2>/tmp/sbom.err && break
            echo "SBOM verify attempt $attempt failed; retrying" >&2
            sleep $((attempt * 5))
          done
          set -e
          test -s /tmp/sbom.jsonl

  attestations-worker:
    runs-on: ubuntu-latest
    needs: [build-metadata, build-push-worker, scan-image-worker]
    env:
      IMAGE_REPO: ${{ needs.build-push-worker.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-worker.outputs.image_digest }}
      SERVICE: worker
      MANIFESTS_CHECKOUT_PATH_ENV: ${{ env.MANIFESTS_CHECKOUT_PATH }}
      MANIFESTS_SUBPATH_ENV: ${{ env.MANIFESTS_SUBPATH }}
      GH_REPOSITORY_ENV: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          ref: ${{ env.MANIFESTS_REF }}
          path: ${{ env.MANIFESTS_CHECKOUT_PATH }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
      - uses: sigstore/cosign-installer@v3.7.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action/download-syft@v0
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/vbbi
          pattern: vbbi-*-worker
          merge-multiple: true
      - name: SBOM
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          syft "$IMAGE_REF" -o spdx-json > sbom.spdx.json
          if [ ! -s sbom.spdx.json ] || ! jq -e '.SPDXID' sbom.spdx.json >/dev/null; then
            echo "FATAL: empty/invalid SBOM" >&2; head -c 512 sbom.spdx.json >&2; exit 1
          fi
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_REF"
          sleep 5
      - name: OpenVEX
        if: ${{ hashFiles('vex.json') != '' }}
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          cosign attest --yes --predicate vex.json --type "https://openvex.dev/ns/v0.2.0" "$IMAGE_REF"
      - name: VBBI step spec
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          printf '{"exit_code":0,"image_ref":"%s","digest":"%s","service":"worker"}' "$IMAGE_REF" "${IMAGE_DIGEST}" > /tmp/vbbi/build-results-worker.json
          cat > /tmp/vbbi/step-spec-worker.json <<'STEPSPEC'
          [
            {"name": "linting-worker",    "file": "/tmp/vbbi/lint-worker.json"},
            {"name": "unit-tests-worker", "file": "/tmp/vbbi/test-worker.json"},
            {"name": "image-build-worker","file": "/tmp/vbbi/build-results-worker.json"},
            {"name": "vuln-scan-worker",  "file": "/tmp/vbbi/scan-worker.json"}
          ]
          STEPSPEC
      - uses: SabinGhost19/Voucher-Based-Build-Integrity-Action@1.0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          commit-sha: ${{ github.sha }}
          step-spec-path: /tmp/vbbi/step-spec-worker.json
          hmac-key: ${{ secrets.VBBI_HMAC_KEY || 'dev-only-vbbi-key' }}
          slsa-level: "3"
      - uses: SabinGhost19/policyAttestor-action@main
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          policy-path: ./security-policy.yaml
          manifest-dir: ./${{ env.MANIFESTS_CHECKOUT_PATH }}/${{ env.MANIFESTS_SUBPATH }}/worker
          attestation-type: https://devsecops.licenta.ro/attestations/custom-zta-policy/v1

  slsa-provenance-api:
    needs: build-push-api
    permissions:
      id-token: write
      packages: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-push-api.outputs.image_repo }}
      digest: ${{ needs.build-push-api.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  slsa-provenance-worker:
    needs: build-push-worker
    permissions:
      id-token: write
      packages: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-push-worker.outputs.image_repo }}
      digest: ${{ needs.build-push-worker.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  sign-api:
    runs-on: ubuntu-latest
    needs: [build-push-api, attestations-api]
    env:
      IMAGE_REPO: ${{ needs.build-push-api.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-api.outputs.image_digest }}
    steps:
      - uses: sigstore/cosign-installer@v3.7.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: cosign sign --yes "${IMAGE_REPO}@${IMAGE_DIGEST}"

  sign-worker:
    runs-on: ubuntu-latest
    needs: [build-push-worker, attestations-worker]
    env:
      IMAGE_REPO: ${{ needs.build-push-worker.outputs.image_repo }}
      IMAGE_DIGEST: ${{ needs.build-push-worker.outputs.image_digest }}
    steps:
      - uses: sigstore/cosign-installer@v3.7.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: cosign sign --yes "${IMAGE_REPO}@${IMAGE_DIGEST}"

  bump-manifests:
    runs-on: ubuntu-latest
    needs: [sign-api, sign-worker, slsa-provenance-api, slsa-provenance-worker, build-push-api, build-push-worker]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      API_IMAGE: ${{ needs.build-push-api.outputs.image_repo }}@${{ needs.build-push-api.outputs.image_digest }}
      WORKER_IMAGE: ${{ needs.build-push-worker.outputs.image_repo }}@${{ needs.build-push-worker.outputs.image_digest }}
      MANIFESTS_REPO_ENV: ${{ env.MANIFESTS_REPO }}
      MANIFESTS_REF_ENV: ${{ env.MANIFESTS_REF }}
      MANIFESTS_SUBPATH_ENV: ${{ env.MANIFESTS_SUBPATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          ref: ${{ env.MANIFESTS_REF }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          path: manifests-repo
          persist-credentials: true
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Bump api + worker image digests
        run: |
          set -euo pipefail
          cd manifests-repo
          export NEW_IMAGE="$API_IMAGE"
          if [ -f "${MANIFESTS_SUBPATH_ENV}/api/zta-api.yaml" ]; then
            yq eval -i '(select(.kind == "ZeroTrustApplication") | .spec.image) = strenv(NEW_IMAGE)' "${MANIFESTS_SUBPATH_ENV}/api/zta-api.yaml"
          fi
          export NEW_IMAGE="$WORKER_IMAGE"
          if [ -f "${MANIFESTS_SUBPATH_ENV}/worker/zta-worker.yaml" ]; then
            yq eval -i '(select(.kind == "ZeroTrustApplication") | .spec.image) = strenv(NEW_IMAGE)' "${MANIFESTS_SUBPATH_ENV}/worker/zta-worker.yaml"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore(image): bump payments [skip ci]"
          git push origin "${MANIFESTS_REF_ENV}"
